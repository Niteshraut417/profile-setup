<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Professional Profile Manager</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; }
        button { padding: 10px 20px; background: #6366f1; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .hidden { display: none; }
        .profile-card { border: 1px solid #e2e8f0; padding: 20px; border-radius: 12px; margin-top: 15px; background: #fafafa; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; display: block; }
        .summary-text { font-size: 0.9rem; color: #475569; font-style: italic; margin: 10px 0; display: block; }
    </style>
</head>
<body>
    
    <div id="authSection" class="card">
        <h2>Login</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>

    <div id="dashboard" class="card hidden">
        <h2>My Profiles</h2>
        <input type="text" id="newName" placeholder="Name for new profile">
        <button onclick="addProfile()">Add Profile</button>
        <div id="profilesGrid"></div>
    </div>

    <div id="detailView" class="card hidden">
        <h2 id="viewName"></h2>
        <input type="file" id="picInput" accept="image/*">
        <textarea id="aboutMe" rows="5" placeholder="Write about yourself..."></textarea>
        <button onclick="saveAndReturn()">Save & Return</button>
        <button onclick="backToDashboard()" style="background:#64748b;">Cancel</button>
    </div>

    <script>
        let currentProfileIndex = null;
        let profiles = [];

        function login() {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
        }

        function addProfile() {
            const name = document.getElementById('newName').value;
            if(!name) return;
            profiles.push({ name: name, about: "", img: "" });
            renderProfiles();
            document.getElementById('newName').value = '';
        }

        function renderProfiles() {
            const grid = document.getElementById('profilesGrid');
            grid.innerHTML = '';
            profiles.forEach((p, i) => {
                grid.innerHTML += `
                    <div class="profile-card">
                        ${p.img ? `<img src="${p.img}" class="avatar">` : ''}
                        <h3>${p.name}</h3>
                        <span class="summary-text">${p.about || "No summary yet."}</span>
                        <button onclick="viewProfile(${i})">Edit Profile</button>
                        <button onclick="profiles.splice(${i},1); renderProfiles();" style="background:#ef4444;">Delete</button>
                    </div>
                `;
            });
        }

        function viewProfile(i) {
            currentProfileIndex = i;
            document.getElementById('viewName').innerText = profiles[i].name;
            document.getElementById('aboutMe').value = profiles[i].about;
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('detailView').classList.remove('hidden');
        }

        function saveAndReturn() {
            const file = document.getElementById('picInput').files[0];
            profiles[currentProfileIndex].about = document.getElementById('aboutMe').value;
            
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    profiles[currentProfileIndex].img = e.target.result;
                    renderProfiles();
                    backToDashboard();
                };
                reader.readAsDataURL(file);
            } else {
                renderProfiles();
                backToDashboard();
            }
        }

        function backToDashboard() {
            document.getElementById('detailView').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
        }
    </script>
</body> 
</html>
