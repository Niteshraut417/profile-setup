<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Profile Manager</title>
    <style>
        :root { --primary: #6366f1; --danger: #ef4444; --edit: #f59e0b; }
        body { font-family: 'Segoe UI', sans-serif; background: #71b3f5; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .card { background: rgb(199, 170, 170); padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; }
        button { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; margin-right: 5px; }
        .btn-add { background: var(--primary); width: 100%; }
        .btn-del { background: var(--danger); }
        .btn-edit { background: var(--edit); }
        #profilesGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .profile-card { background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin: 0 auto 10px; background: #e2e8f0; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h2 id="formTitle">Add New Profile</h2>
            <form id="profileForm">
                <input type="hidden" id="editIndex" value="-1">
                <input type="text" id="name" placeholder="Full Name" required>
                <input type="email" id="email" placeholder="Email" required>
                <input type="date" id="dob" required>
                <input type="file" id="image" accept="image/*">
                <button type="submit" class="btn-add" id="submitBtn">Add to Collection</button>
            </form>
        </div>

        <div id="profilesGrid"></div>
    </div>

    <script>
        const form = document.getElementById('profileForm');
        let profiles = [];

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const index = document.getElementById('editIndex').value;
            const profile = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                dob: document.getElementById('dob').value,
                img: null 
            };

            const imageFile = document.getElementById('image').files[0];
            if (imageFile) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    profile.img = e.target.result;
                    saveProfile(profile, index);
                };
                reader.readAsDataURL(imageFile);
            } else {
                profile.img = index > -1 ? profiles[index].img : null;
                saveProfile(profile, index);
            }
        });

        function saveProfile(profile, index) {
            if (index > -1) profiles[index] = profile;
            else profiles.push(profile);
            renderProfiles();
            form.reset();
            document.getElementById('editIndex').value = -1;
            document.getElementById('submitBtn').innerText = "Add to Collection";
        }

        function renderProfiles() {
            const grid = document.getElementById('profilesGrid');
            grid.innerHTML = '';
            profiles.forEach((p, i) => {
                const card = document.createElement('div');
                card.className = 'profile-card';
                card.innerHTML = `
                    ${p.img ? `<img src="${p.img}" class="avatar">` : `<div class="avatar">${p.name[0].toUpperCase()}</div>`}
                    <h3>${p.name}</h3>
                    <p>${p.email}</p>
                    <button class="btn-edit" onclick="editProfile(${i})">Edit</button>
                    <button class="btn-del" onclick="deleteProfile(${i})">Delete</button>
                `;
                grid.appendChild(card);
            });
        }

        function deleteProfile(i) {
            profiles.splice(i, 1);
            renderProfiles();
        }

        function editProfile(i) {
            const p = profiles[i];
            document.getElementById('name').value = p.name;
            document.getElementById('email').value = p.email;
            document.getElementById('dob').value = p.dob;
            document.getElementById('editIndex').value = i;
            document.getElementById('submitBtn').innerText = "Update Profile";
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
