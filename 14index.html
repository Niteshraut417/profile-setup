<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced Profile Manager</title>
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; display: flex; justify-content: center; padding: 40px 20px; margin: 0; }
        .page { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 20px 25px rgba(0,0,0,0.3); width: 100%; max-width: 600px; transition: opacity 0.4s ease; position: absolute; }
        .hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        
        /* Profile Layout */
        .main-avatar { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 4px solid var(--primary); margin-bottom: 20px; }
        .gallery-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
        .gallery-img { width: 100%; height: 60px; object-fit: cover; border-radius: 8px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; }
        button { padding: 12px 20px; background: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="dashboard" class="page">
        <h2>My Collection</h2>
        <button onclick="addProfile()">Add Profile</button>
        <div id="profilesGrid"></div>
    </div>

    <div id="detailView" class="page hidden">
        <h2 id="viewName"></h2>
        
        <label>Profile Picture:</label>
        <input type="file" id="mainPicInput" accept="image/*">
        
        <label>Gallery (Multiple):</label>
        <input type="file" id="galleryInput" multiple accept="image/*">
        
        <textarea id="aboutMe" rows="3" placeholder="Bio..."></textarea>
        <button onclick="saveAndReturn()">Save Profile</button>
    </div>

    <script>
        let currentProfileIndex = null;
        let profiles = JSON.parse(localStorage.getItem('myProfiles')) || [];

        function goToPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function renderProfiles() {
            const grid = document.getElementById('profilesGrid');
            grid.innerHTML = '';
            profiles.forEach((p, i) => {
                grid.innerHTML += `
                    <div style="border:1px solid #ddd; padding:20px; margin-top:15px; border-radius:16px;">
                        ${p.mainPic ? `<img src="${p.mainPic}" class="main-avatar" style="width:80px; height:80px;">` : ''}
                        <h3>${p.name}</h3>
                        <div class="gallery-grid">
                            ${p.gallery.map(img => `<img src="${img}" class="gallery-img">`).join('')}
                        </div>
                        <button onclick="editProfile(${i})">Manage</button>
                    </div>
                `;
            });
        }

        function editProfile(i) {
            currentProfileIndex = i;
            document.getElementById('viewName').innerText = profiles[i].name;
            goToPage('detailView');
        }

        async function saveAndReturn() {
            const mainFile = document.getElementById('mainPicInput').files[0];
            const galleryFiles = document.getElementById('galleryInput').files;
            
            if (mainFile) profiles[currentProfileIndex].mainPic = await toBase64(mainFile);
            
            for (let file of galleryFiles) {
                profiles[currentProfileIndex].gallery.push(await toBase64(file));
            }
            
            localStorage.setItem('myProfiles', JSON.stringify(profiles));
            renderProfiles();
            goToPage('dashboard');
        }

        const toBase64 = file => new Promise(res => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => res(reader.result);
        });

        renderProfiles();
    </script>
</body>
</html>
