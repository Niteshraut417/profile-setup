<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pro Profile Manager</title>
    <style>
        :root { --primary: #6366f1; --accent: #8b5cf6; --bg: #0f172a; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #f8fafc; min-height: 100vh; display: flex; justify-content: center; padding: 40px 20px; margin: 0; }
        
        /* Smooth Page Transition */
        .page { background: #1e293b; padding: 30px; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); width: 100%; max-width: 500px; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); position: absolute; }
        .hidden { opacity: 0; transform: scale(0.95); visibility: hidden; pointer-events: none; }
        
        h2 { text-align: center; background: linear-gradient(to right, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 2rem; }
        input, textarea { width: 100%; padding: 14px; margin: 10px 0; background: #334155; border: 1px solid #475569; border-radius: 12px; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; margin-top: 10px; transition: 0.3s; }
        button:hover { filter: brightness(1.2); }
        
        .gallery-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 15px; }
        .gallery-img { width: 100%; height: 50px; object-fit: cover; border-radius: 8px; }
        .profile-card { background: #334155; padding: 20px; border-radius: 16px; margin-top: 20px; border-left: 4px solid var(--primary); }
    </style>
</head>
<body>

    <!-- 1. Login -->
    <div id="authSection" class="page">
        <h2>Welcome Back</h2>
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">
        <button onclick="goToPage('dashboard')">Sign In</button>
    </div>

    <!-- 2. Dashboard -->
    <div id="dashboard" class="page hidden">
        <h2>Your Collection</h2>
        <div id="profilesGrid"></div>
        
        <!-- Bottom Action Area -->
        <div style="margin-top: 40px; border-top: 1px solid #475569; padding-top: 20px;">
            <div id="addArea" class="hidden">
                <input type="text" id="newName" placeholder="Enter name...">
                <button onclick="addProfile()">Confirm Add</button>
            </div>
            <button id="addBtn" onclick="document.getElementById('addArea').classList.remove('hidden'); this.style.display='none'">+ Add New Profile</button>
            <button onclick="location.reload()" style="background:#475569;">Logout</button>
        </div>
    </div>

    <!-- 3. Edit View -->
    <div id="detailView" class="page hidden">
        <h2 id="viewName">Edit Details</h2>
        <input type="file" id="mainPic" accept="image/*">
        <input type="file" id="galleryInput" multiple accept="image/*">
        <textarea id="aboutMe" rows="3" placeholder="Bio..."></textarea>
        <button onclick="saveAndReturn()">Save Changes</button>
        <button onclick="goToPage('dashboard')" style="background:#475569;">Cancel</button>
    </div>

    <script>
        let currentProfileIndex = null;
        let profiles = JSON.parse(localStorage.getItem('myProfiles')) || [];

        function goToPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function addProfile() {
            const name = document.getElementById('newName').value;
            if(!name) return;
            profiles.push({ name, about: "", mainPic: "", gallery: [] });
            saveAndRefresh();
            document.getElementById('addArea').classList.add('hidden');
            document.getElementById('addBtn').style.display = 'block';
            document.getElementById('newName').value = '';
        }

        function renderProfiles() {
            const grid = document.getElementById('profilesGrid');
            grid.innerHTML = profiles.map((p, i) => `
                <div class="profile-card">
                    <h3>${p.name}</h3>
                    <div class="gallery-grid">${p.gallery.map(img => `<img src="${img}" class="gallery-img">`).join('')}</div>
                    <button onclick="editProfile(${i})" style="padding: 8px;">Edit</button>
                </div>
            `).join('');
        }

        function editProfile(i) {
            currentProfileIndex = i;
            document.getElementById('viewName').innerText = "Edit " + profiles[i].name;
            goToPage('detailView');
        }

        async function saveAndReturn() {
            const mainFile = document.getElementById('mainPic').files[0];
            const galleryFiles = document.getElementById('galleryInput').files;
            
            if (mainFile) profiles[currentProfileIndex].mainPic = await toBase64(mainFile);
            for (let file of galleryFiles) profiles[currentProfileIndex].gallery.push(await toBase64(file));
            
            profiles[currentProfileIndex].about = document.getElementById('aboutMe').value;
            saveAndRefresh();
            goToPage('dashboard');
        }

        function saveAndRefresh() {
            localStorage.setItem('myProfiles', JSON.stringify(profiles));
            renderProfiles();
        }

        const toBase64 = file => new Promise(res => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => res(reader.result);
        });

        renderProfiles();
    </script>
</body>
</html>
