<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Profiler Pro</title>
    <style>
        :root { --primary: #6366f1; --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: var(--bg-gradient); margin: 0; }
        
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 100%; max-width: 400px; text-align: center; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; margin-top: 10px; font-weight: bold; }
        
        #profileDisplay { display: none; }
        .avatar-preview { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 4px solid var(--primary); margin: 0 auto 20px; display: block; }
        .placeholder-avatar { width: 100px; height: 100px; background: #e2e8f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: #64748b; margin: 0 auto 20px; }
    </style>
</head>
<body>

    <div class="card" id="formCard">
        <h2>Build Your Profile</h2>
        <form id="profileForm">
            <input type="text" id="nameInput" placeholder="Full Name" required>
            <input type="email" id="emailInput" placeholder="Email" required>
            <input type="date" id="dobInput" required>
            <label style="display:block; text-align:left; font-size: 0.8rem; color: #64748b;">Upload Photo:</label>
            <input type="file" id="imageInput" accept="image/*">
            <button type="submit">Create Profile</button>
        </form>
    </div>

    <div class="card" id="profileDisplay">
        <div id="imageContainer"></div>
        <h2 id="displayName"></h2>
        <p><strong>Email:</strong> <span id="displayEmail"></span></p>
        <p><strong>Date of Birth:</strong> <span id="displayDob"></span></p>
        <button onclick="location.reload()" style="background: #64748b;">Edit Profile</button>
    </div>

    <script>
        document.getElementById('profileForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('nameInput').value;
            const email = document.getElementById('emailInput').value;
            const dob = document.getElementById('dobInput').value;
            const imageFile = document.getElementById('imageInput').files[0];

            document.getElementById('displayName').innerText = name;
            document.getElementById('displayEmail').innerText = email;
            document.getElementById('displayDob').innerText = dob;

            const imgContainer = document.getElementById('imageContainer');
            if (imageFile) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imgContainer.innerHTML = `<img src="${e.target.result}" class="avatar-preview">`;
                }
                reader.readAsDataURL(imageFile);
            } else {
                imgContainer.innerHTML = `<div class="placeholder-avatar">${name.charAt(0).toUpperCase()}</div>`;
            }

            document.getElementById('formCard').style.display = 'none';
            document.getElementById('profileDisplay').style.display = 'block';
        });
    </script>
</body>
</html>
