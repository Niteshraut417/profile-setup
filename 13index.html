<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Profile Manager</title>
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; display: flex; justify-content: center; padding: 40px 20px; margin: 0; color: #334155; }
        .page { background: var(--card); padding: 40px; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); width: 100%; max-width: 600px; transition: opacity 0.4s ease; position: absolute; }
        .hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        input, textarea { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; }
        button { padding: 12px 24px; background: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; transition: transform 0.2s; }
        button:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .gallery-img { width: 100%; height: 80px; object-fit: cover; border-radius: 8px; }
        .profile-card { border: 1px solid #e2e8f0; padding: 20px; border-radius: 16px; margin-top: 20px; background: #f8fafc; }
    </style>
</head>
<body>

    <div id="authSection" class="page">
        <h2>System Login</h2>
        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPass" placeholder="Password">
        <button onclick="login()">Enter System</button>
    </div>

    <div id="dashboard" class="page hidden">
        <h2>Your Profiles</h2>
        <input type="text" id="newName" placeholder="Profile Name">
        <button onclick="addProfile()">Add New Profile</button>
        <div id="profilesGrid"></div>
        <br><button onclick="location.reload()" style="background:#64748b;">Logout</button>
    </div>

    <div id="detailView" class="page hidden">
        <h2 id="viewName">Edit Profile</h2>
        <input type="file" id="galleryInput" multiple accept="image/*">
        <div id="previewGrid" class="gallery-grid"></div>
        <textarea id="aboutMe" rows="4" placeholder="Professional Bio..."></textarea>
        <button onclick="saveAndReturn()">Save All Changes</button>
        <button onclick="goToPage('dashboard')" style="background:#94a3b8;">Cancel</button>
    </div>

    <script>
        let currentProfileIndex = null;
        // Load existing profiles from memory
        let profiles = JSON.parse(localStorage.getItem('myProfiles')) || [];

        function goToPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function login() { goToPage('dashboard'); renderProfiles(); }

        function addProfile() {
            const name = document.getElementById('newName').value;
            if(!name) return;
            profiles.push({ name, about: "", gallery: [] });
            saveAndRefresh();
            document.getElementById('newName').value = '';
        }

        function renderProfiles() {
            const grid = document.getElementById('profilesGrid');
            grid.innerHTML = '';
            profiles.forEach((p, i) => {
                grid.innerHTML += `
                    <div class="profile-card">
                        <h3>${p.name}</h3>
                        <div class="gallery-grid">${p.gallery.map(img => `<img src="${img}" class="gallery-img">`).join('')}</div>
                        <p>${p.about || "No bio yet."}</p>
                        <button onclick="editProfile(${i})">Manage Profile</button>
                    </div>
                `;
            });
        }

        function editProfile(i) {
            currentProfileIndex = i;
            document.getElementById('viewName').innerText = "Edit " + profiles[i].name;
            document.getElementById('aboutMe').value = profiles[i].about;
            document.getElementById('previewGrid').innerHTML = profiles[i].gallery.map(img => `<img src="${img}" class="gallery-img">`).join('');
            goToPage('detailView');
        }

        async function saveAndReturn() {
            const files = document.getElementById('galleryInput').files;
            profiles[currentProfileIndex].about = document.getElementById('aboutMe').value;
            
            for (let file of files) {
                const base64 = await toBase64(file);
                profiles[currentProfileIndex].gallery.push(base64);
            }
            saveAndRefresh();
            goToPage('dashboard');
        }

        function saveAndRefresh() {
            localStorage.setItem('myProfiles', JSON.stringify(profiles));
            renderProfiles();
        }

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        renderProfiles(); // Initial load
    </script>
</body>
</html>
